<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Senha - Intranet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .container { display: flex; width: 100%; height: 100vh; background-color: #121212; }

        /* Lado esquerdo: Banner */
        .banner-side {
            flex: 6; 
            background: url('https://i.postimg.cc/Hxxp8xDK/8.png') center center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        /* Lado direito: Painel Escuro */
        .login-side {
            flex: 4; 
            background-color: #111111;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .header-gold { width: 100%; height: 50px; background-color: #111111; border-top: 15px solid #bd9b60; position: absolute; top: 0; }
        
        .logo { width: 70px; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); z-index: 10; }

        .form-wrapper { width: 80%; max-width: 350px; margin-top: 120px; }

        h2 { color: white; font-size: 18px; margin-bottom: 5px; font-weight: 500; }
        p { color: #888; font-size: 13px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-icon { position: absolute; left: 15px; top: 12px; color: #777; font-size: 14px; }
        
        .input-field {
            width: 100%; background-color: transparent; border: 1px solid #333;
            border-radius: 4px; padding: 12px 10px 12px 40px; color: white; font-size: 14px; transition: border 0.3s;
        }
        .input-field:focus { border-color: #bd9b60; outline: none; }

        .btn-entrar {
            width: 100%; background-color: #e5c98d; color: #111; font-weight: bold;
            padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: 0.2s; margin-top: 10px;
        }
        .btn-entrar:hover { background-color: #cbb075; }

        #msgUpdate { font-size: 13px; margin-bottom: 15px; display: none; text-align: left; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .banner-side { flex: 4; min-height: 250px; background-position: top; }
            .login-side { flex: 6; width: 100%; }
            .form-wrapper { margin-top: 80px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-side"></div>
    <div class="login-side">
        <div class="header-gold"></div>
        <img src="https://i.postimg.cc/x8VnxPNy/ESCUDO-EFAS.png" class="logo" alt="Logo">
        
        <div class="form-wrapper">
            <h2>Primeiro Acesso</h2>
            <p>Por questões de segurança, cadastre uma nova senha pessoal.</p>
            
            <form id="updateForm">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="npmUpdate" class="input-field" placeholder="Confirme seu NPM" required>
                </div>
                
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="novaSenha" class="input-field" placeholder="Nova Senha" required>
                </div>

                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="confirmaSenha" class="input-field" placeholder="Repita a Nova Senha" required>
                </div>

                <div id="msgUpdate"></div>

                <button type="submit" id="btnUpdate" class="btn-entrar">Atualizar Senha</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('updateForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        var btn = document.getElementById('btnUpdate');
        var msg = document.getElementById('msgUpdate');
        var npm = document.getElementById('npmUpdate').value;
        var novaSenha = document.getElementById('novaSenha').value;
        var confirmaSenha = document.getElementById('confirmaSenha').value;

        if(novaSenha !== confirmaSenha) {
            msg.innerHTML = 'As senhas não coincidem.';
            msg.style.color = '#ff4d4d';
            msg.style.display = 'block';
            return;
        }

        btn.innerHTML = 'Gravando...';
        btn.style.backgroundColor = '#666';
        msg.style.display = 'none';

        // ATENÇÃO: COLOQUE A MESMA URL DO SEU APPS SCRIPT AQUI
        var scriptURL = "SUA_URL_DO_APPS_SCRIPT_AQUI"; 

        var formData = new URLSearchParams();
        formData.append('acao', 'atualizar_senha');
        formData.append('npm', npm);
        formData.append('novaSenha', novaSenha);

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'sucesso') {
                btn.innerHTML = 'Senha Atualizada!';
                btn.style.backgroundColor = '#4CAF50';
                msg.innerHTML = 'Redirecionando para o login...';
                msg.style.color = '#4CAF50';
                msg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = "index.html"; // Retorna para a tela de login principal
                }, 2000);
            } else {
                btn.innerHTML = 'Atualizar Senha';
                btn.style.backgroundColor = '#e5c98d';
                msg.innerHTML = data.mensagem;
                msg.style.color = '#ff4d4d';
                msg.style.display = 'block';
            }
        })
        .catch(error => {
            btn.innerHTML = 'Atualizar Senha';
            btn.style.backgroundColor = '#e5c98d';
            msg.innerHTML = 'Erro de rede. Verifique a conexão.';
            msg.style.color = '#ff4d4d';
            msg.style.display = 'block';
        });
    });
</script>
</body>
</html>
