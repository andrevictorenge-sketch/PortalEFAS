<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Container principal ocupando todo o espaço disponível */
    .container {
        display: flex;
        width: 100%;
        min-height: 600px; /* Altura mínima para o iframe do Google Sites */
        height: 100vh;
        background-color: #121212;
    }

    /* Lado esquerdo: O Banner Promocional */
    .banner-side {
        flex: 7; /* Ocupa 70% da tela */
        /* ATENÇÃO: Substitua o link abaixo pelo link da sua imagem com o PM e o QR Code */
        background: url('https://i.postimg.cc/Hxxp8xDK/8.png') center center;
        background-size: cover;
        background-repeat: no-repeat;
    }

    /* Lado direito: O Painel de Login Escuro */
    .login-side {
        flex: 3; /* Ocupa 30% da tela */
        background-color: #111111;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    /* Faixa dourada no topo com o logo sobreposto */
    .header-gold {
        width: 100%;
        height: 50px;
        background-color: #111111;
        border-top: 15px solid #bd9b60; /* Dourado PMMG */
        position: absolute;
        top: 0;
    }

    .logo {
        width: 70px;
        position: absolute;
        top: 5px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
    }

    /* Área do formulário */
    .form-wrapper {
        width: 80%;
        max-width: 350px;
        margin-top: 120px; /* Espaço para a faixa e o logo */
    }

    h2 {
        color: white;
        font-size: 18px;
        margin-bottom: 30px;
        font-weight: 500;
    }

    .input-group {
        position: relative;
        margin-bottom: 20px;
    }

    /* Ícones dentro do input simulados com texto para não depender de bibliotecas externas */
    .input-icon {
        position: absolute;
        left: 15px;
        top: 12px;
        color: #777;
        font-size: 14px;
    }

    .input-field {
        width: 100%;
        background-color: transparent;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 12px 10px 12px 40px;
        color: white;
        font-size: 14px;
        transition: border 0.3s;
    }

    .input-field:focus {
        border-color: #bd9b60;
        outline: none;
    }

    .action-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
    }

    .btn-entrar {
        background-color: #e5c98d;
        color: #111;
        font-weight: bold;
        padding: 10px 30px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
    }

    .btn-entrar:hover {
        background-color: #cbb075;
    }

    .link-senha {
        color: #888;
        text-decoration: none;
        font-size: 12px;
    }

    .link-senha:hover {
        color: white;
    }

    #mensagemErro {
        color: #ff4d4d;
        font-size: 13px;
        margin-bottom: 15px;
        display: none;
        text-align: left;
    }

    /* Responsividade para telas menores (Celulares) */
    @media (max-width: 768px) {
        .container { flex-direction: column; }
        .banner-side { flex: 4; min-height: 250px; background-position: top; }
        .login-side { flex: 6; width: 100%; }
        .form-wrapper { margin-top: 80px; }
    }
</style>

<div class="container">
    <div class="banner-side"></div>
    <div class="login-side">
        <div class="header-gold"></div>
        <img src="https://i.postimg.cc/x8VnxPNy/ESCUDO-EFAS.png" class="logo" alt="Logo">
        
        <div class="form-wrapper">
            <h2>Portal EFAS</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="npm" class="input-field" placeholder="Usuário (NPM)" required>
                </div>
                
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="senha" class="input-field" placeholder="Senha" required>
                </div>

                <div id="mensagemErro"></div>

                <div class="action-row">
                    <button type="submit" id="btnSubmit" class="btn-entrar">Entrar</button>
                    <a href="#" class="link-senha">Esqueci minha senha</a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Importando a Biblioteca Oficial do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ==========================================
    // 1. CONFIGURAÇÃO DO SUPABASE
    // ==========================================
    const SUPABASE_URL = 'https://ofefmfqjnvjhsyxnxnbg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZWZtZnFqbnZqaHN5eG54bmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDQ2MTAsImV4cCI6MjEwMDAyMDYxMH0.H-SPjcYpCvBuICY_3_Od7J7cFiJBeFq1PNdBIoGYvr0';
    
    // CORREÇÃO: Variável renomeada para clienteSupabase para evitar conflito
    const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==========================================
    // 2. LÓGICA DE LOGIN
    // ==========================================
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        var btn = document.getElementById('btnSubmit');
        var msgErro = document.getElementById('mensagemErro');
        var npmDigitado = document.getElementById('npm').value.trim();
        var senhaDigitada = document.getElementById('senha').value.trim();

        btn.innerHTML = 'Aguarde...';
        btn.style.backgroundColor = '#666';
        msgErro.style.display = 'none';

        try {
            const { data, error } = await clienteSupabase
                .from('usuarios')
                .select('*')
                .eq('npm', npmDigitado)
                .single();

            if (error || !data) {
                throw new Error("NPM não encontrado no sistema.");
            }

            if (data.senha === senhaDigitada) {
                sessionStorage.setItem('usuarioAutenticado', 'SIM_PMMG');
                sessionStorage.setItem('usuario_nome', data.nome);
                sessionStorage.setItem('usuario_npm', data.npm);
                sessionStorage.setItem('usuario_nivel', data.nivel_acesso);

                if (data.senha === data.npm || data.senha === '123456') {
                    btn.innerHTML = 'Aviso';
                    btn.style.backgroundColor = '#bd9b60';
                    window.location.href = 'nova-senha.html';
                } else {
                    btn.innerHTML = 'Aprovado';
                    btn.style.backgroundColor = '#4CAF50';
                    window.location.href = data.url_painel; 
                }
            } else {
                throw new Error("Senha incorreta.");
            }

        } catch (erro) {
            btn.innerHTML = 'Entrar';
            btn.style.backgroundColor = '#e5c98d';
            msgErro.innerHTML = erro.message;
            msgErro.style.display = 'block';
        }
    });
</script>
